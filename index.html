<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Para Luna — de parte de Sombra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- CALL SCREEN -->
  <div id="call-screen">
    <div class="call-container">
      <div class="call-status">Llamada entrante</div>
      <div class="call-avatar"><i class="fas fa-moon"></i></div>
      <div class="call-name">Sombra</div>
      <div class="call-label">Móvil · 600 km de distancia</div>
      <div class="call-buttons">
        <button class="call-btn decline" disabled>
          <i class="fas fa-phone-slash"></i><span>Rechazar</span>
        </button>
        <button class="call-btn accept" id="answer-call">
          <i class="fas fa-phone"></i><span>Responder</span>
        </button>
      </div>
      <div class="call-waves"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" class="hidden">

    <!-- PAGE NAVIGATION -->
    <div id="page-nav" class="page-nav hidden">
      <button id="nav-prev" class="nav-arrow" aria-label="Anterior"><i class="fas fa-chevron-left"></i></button>
      <div class="nav-indicator" id="page-indicator">1 / 10</div>
      <button id="nav-next" class="nav-arrow" aria-label="Siguiente"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- PAGES — rendered by JS from book-data.js -->
    <div id="pages-scroll"></div>

    <!-- MUSIC -->
    <button id="music-toggle" class="music-btn" title="Reproducir Counting Stars">
      <i class="fas fa-music"></i>
    </button>
    <div id="music-player" class="music-player hidden">
      <div class="music-player-header">
        <span>Counting Stars — OneRepublic</span>
        <button id="close-music"><i class="fas fa-times"></i></button>
      </div>
      <iframe id="spotify-iframe" src="https://open.spotify.com/embed/track/7oTth77HJhTFyHHI5jjrh9?utm_source=generator&theme=0" width="100%" height="80" style="border-radius:4px" frameborder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      <div class="music-fallback">
        <span class="music-fallback-text">¿No puedes reproducirlo?</span>
        <a href="https://open.spotify.com/intl-es/track/7oTth77HJhTFyHHI5jjrh9" target="_blank" rel="noopener noreferrer" class="music-fallback-link"><i class="fab fa-spotify"></i> Abrir en Spotify</a>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/book-data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
